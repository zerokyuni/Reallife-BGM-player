<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BGM 구역 편집기 & 플레이어</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* UI Floating Panels */
        .floating-ui {
            z-index: 1000;
            position: absolute;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
        }

        /* Tool active states */
        .tool-btn.active {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-color: #2563eb;
        }

        /* Prevent text selection while painting */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        /* Custom scrollbar for palette */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans no-select">

    <!-- SVG Patterns for Grid Visualization -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <defs>
            <pattern id="pattern-stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <rect width="4" height="8" transform="translate(0,0)" fill="rgba(255,255,255,0.4)"></rect>
            </pattern>
            <pattern id="pattern-dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
                <circle cx="4" cy="4" r="2" fill="rgba(255,255,255,0.5)"></circle>
            </pattern>
            <pattern id="pattern-cross" width="8" height="8" patternUnits="userSpaceOnUse">
                <path d="M 0 0 L 8 8 M 8 0 L 0 8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"></path>
            </pattern>
        </defs>
    </svg>

    <!-- Hidden YouTube Players -->
    <div id="youtube-container" class="hidden">
        <div id="yt-player-1"></div>
        <div id="yt-player-2"></div>
    </div>

    <!-- Top Toolbar (모바일 반응형 개선) -->
    <div class="floating-ui top-2 sm:top-4 left-1/2 transform -translate-x-1/2 bg-white/95 rounded-2xl sm:rounded-full p-2 sm:px-4 sm:py-2 flex flex-wrap items-center justify-center gap-2 sm:space-x-2 border border-gray-200 w-[96%] sm:w-auto max-w-4xl">
        
        <!-- Tools (Pan, Paint, Erase) -->
        <div class="flex space-x-1 sm:space-x-2">
            <button id="btn-pan" class="tool-btn active w-9 h-9 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-100 transition" title="이동 (Pan)">
                <i class="fa-solid fa-hand"></i>
            </button>
            <button id="btn-paint" class="tool-btn w-9 h-9 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-100 transition" title="그리기 (Paint)">
                <i class="fa-solid fa-paintbrush"></i>
            </button>
            <button id="btn-erase" class="tool-btn w-9 h-9 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-100 transition" title="지우개 (Eraser)">
                <i class="fa-solid fa-eraser"></i>
            </button>
        </div>
        
        <div class="w-px h-6 bg-gray-300 hidden sm:block"></div>
        
        <!-- 브러쉬 사이즈 조절 (Pan 모드에선 숨김 처리) -->
        <div id="brush-size-container" class="flex items-center space-x-1 sm:space-x-2 px-2 bg-gray-50 rounded-lg py-1 border border-gray-100" title="브러쉬 사이즈">
            <i class="fa-solid fa-circle text-gray-400 text-[6px] sm:text-[8px]"></i>
            <input type="range" id="brush-size" min="1" max="10" value="1" class="w-16 sm:w-20 accent-blue-500 cursor-pointer">
            <i class="fa-solid fa-circle text-gray-400 text-sm sm:text-lg"></i>
        </div>

        <div id="brush-size-divider" class="w-px h-6 bg-gray-300 hidden sm:block"></div>
        
        <!-- Actions (Save, Load, Login) -->
        <div class="flex space-x-1 sm:space-x-2">
            <button id="btn-save" class="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-medium text-green-700 hover:bg-green-50 transition flex items-center" title="JSON 다운로드">
                <i class="fa-solid fa-file-export sm:mr-1"></i> <span class="hidden sm:inline">파일 저장</span>
            </button>
            <button id="btn-load" class="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-medium text-blue-700 hover:bg-blue-50 transition flex items-center" title="JSON 불러오기">
                <i class="fa-solid fa-file-import sm:mr-1"></i> <span class="hidden sm:inline">파일 열기</span>
            </button>
            <div class="w-px h-4 bg-gray-300 my-auto mx-1 sm:mx-2 block"></div>
            <button id="btn-login" class="px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-medium text-gray-700 hover:bg-gray-100 transition flex items-center border border-gray-200 sm:border-transparent">
                <i class="fa-brands fa-google text-red-500 sm:mr-1"></i> <span class="hidden sm:inline">로그인</span>
            </button>
        </div>
    </div>

    <!-- Palette Sidebar (모바일 축소) -->
    <div class="floating-ui top-24 sm:top-20 left-2 sm:left-4 bg-white/95 rounded-xl p-3 sm:p-4 border border-gray-200 w-48 sm:w-64 max-h-[50vh] sm:max-h-[70vh] flex flex-col transition-all">
        <h3 class="font-bold text-gray-800 mb-2 sm:mb-3 text-xs sm:text-sm flex-shrink-0">음악 구역 팔레트</h3>
        <div id="palette-container" class="space-y-1 sm:space-y-2 overflow-y-auto custom-scroll flex-grow mb-2 sm:mb-3 pr-1">
            <!-- Palette items injected via JS -->
        </div>
        <button id="btn-add-zone" class="w-full py-1.5 sm:py-2 bg-gray-50 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg text-xs sm:text-sm transition flex-shrink-0 border border-gray-300 border-dashed">
            <i class="fa-solid fa-plus mr-1"></i> 새 구역 추가
        </button>
    </div>

    <!-- Add Zone Modal -->
    <div id="add-zone-modal" class="hidden fixed inset-0 bg-black/60 z-[2000] flex items-center justify-center px-4">
        <div class="bg-white rounded-2xl p-5 sm:p-6 w-full max-w-sm shadow-2xl">
            <h2 id="modal-title" class="text-base sm:text-lg font-bold mb-4 text-gray-800">새 음악 구역 만들기</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">구역 이름</label>
                    <input type="text" id="new-zone-name" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="예: 평화의 숲">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">구역 색상</label>
                    <input type="color" id="new-zone-color" class="w-full h-10 border rounded-lg cursor-pointer bg-gray-50" value="#10b981">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">패턴 (옵션)</label>
                    <select id="new-zone-pattern" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                        <option value="url(#pattern-stripes)">빗금 (Stripes)</option>
                        <option value="url(#pattern-dots)">점 (Dots)</option>
                        <option value="url(#pattern-cross)">십자 (Cross)</option>
                        <option value="none">없음 (단색)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">YouTube 영상 링크 (또는 ID)</label>
                    <div class="flex space-x-2">
                        <input type="text" id="new-zone-vid" class="flex-grow border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="예: https://youtu.be/...">
                        <button type="button" id="btn-fetch-yt" class="px-3 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-xs font-semibold transition whitespace-nowrap">정보 가져오기</button>
                    </div>
                    <p id="yt-fetch-msg" class="text-[10px] text-gray-500 mt-1"></p>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">음악 제목</label>
                    <input type="text" id="new-zone-title" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" placeholder="예: Lofi Hip Hop">
                </div>
            </div>
            <div class="mt-6 flex justify-end space-x-2">
                <button id="btn-cancel-zone" class="px-4 py-2 text-xs sm:text-sm font-semibold text-gray-600 hover:bg-gray-100 rounded-lg">취소</button>
                <button id="btn-submit-zone" class="px-4 py-2 text-xs sm:text-sm font-semibold text-white bg-blue-500 hover:bg-blue-600 rounded-lg shadow-md">추가</button>
            </div>
        </div>
    </div>

    <!-- Bottom Status Bar (모바일 스택 정렬) -->
    <div class="floating-ui bottom-4 sm:bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900/90 text-white rounded-xl sm:rounded-full px-4 sm:px-6 py-2 sm:py-3 flex flex-col sm:flex-row items-center sm:space-x-6 w-[92%] sm:min-w-[400px] justify-between shadow-xl gap-2 sm:gap-0">
        <div class="flex items-center space-x-3 w-full sm:w-auto">
            <button id="btn-gps" class="text-gray-400 hover:text-white transition bg-gray-800 sm:bg-transparent p-2 sm:p-0 rounded-full sm:rounded-none" title="내 위치로 이동">
                <i class="fa-solid fa-location-crosshairs text-lg sm:text-xl"></i>
            </button>
            <div class="flex flex-col flex-grow">
                <span id="status-zone" class="text-[10px] sm:text-xs text-gray-400 font-semibold uppercase tracking-wider">구역 이탈 (빈 공간)</span>
                <span id="status-song" class="text-xs sm:text-sm font-medium truncate w-full sm:w-48">재생 중인 음악 없음</span>
            </div>
        </div>
        <div class="flex items-center space-x-4 w-full sm:w-auto justify-between sm:justify-end border-t border-gray-700 sm:border-0 pt-2 sm:pt-0">
            <span id="sync-status" class="text-[10px] sm:text-xs text-gray-400 font-medium"></span>
            <div id="auth-status" class="text-[10px] sm:text-xs text-gray-400 bg-gray-800 sm:bg-transparent px-2 py-1 sm:p-0 rounded">
                비로그인 상태
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <script type="module">
        // ==========================================
        // 1. Firebase 설정
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwHbDLDjgxHczzfADi6XX0mxefk4TcmGs",
            authDomain: "reallife-audio-zone.firebaseapp.com",
            projectId: "reallife-audio-zone",
            storageBucket: "reallife-audio-zone.firebasestorage.app",
            messagingSenderId: "502159779380",
            appId: "1:502159779380:web:f5932ddeea29c8cebd4c61",
            measurementId: "G-FKGW29C24L"
        };

        let app, auth, db, currentUser = null;
        try {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "본인의_API_KEY를_여기에_넣어주세요") {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.error("Firebase 초기화 에러:", e);
        }

        // ==========================================
        // 2. 음악 구역 정의 (색상, 패턴, 유튜브 ID)
        // ==========================================
        let ZONES = {
            'zone1': { name: '나의 집', color: '#10b981', pattern: 'url(#pattern-stripes)', videoId: 'jfKfPfyJRdk', title: '아늑한 휴식 (Lofi Chill)' },
            'zone2': { name: '회사 / 학교', color: '#3b82f6', pattern: 'url(#pattern-dots)', videoId: '5qap5aO4i9A', title: '집중 모드 (Study/Work)' },
            'zone3': { name: '상점 / 카페', color: '#f59e0b', pattern: 'url(#pattern-cross)', videoId: 'lTRiuFIWV54', title: '여유로운 거리 (Cafe Vibe)' }
        };

        // ==========================================
        // 3. 상태 변수
        // ==========================================
        const GRID_SIZE = 0.0001; // 약 11미터
        let currentMode = 'pan'; // 'pan', 'paint', 'erase'
        let selectedZone = 'zone1';
        let isPainting = false;
        
        // 데이터 구조: { "위도인덱스_경도인덱스": "zoneID" }
        const gridData = {}; 
        const gridRectangles = {}; // 화면에 그려진 Leaflet Rect 객체들

        let userLocationMarker = null;
        let watchId = null;
        let currentPlayingZone = null;
        let isAudioAllowed = false; 
        let editingZoneId = null; 

        // ==========================================
        // Firebase 실시간 동기화 함수
        // ==========================================
        let saveTimeout = null;
        function scheduleFirebaseSave() {
            if (!currentUser || !db) return;
            
            const syncStatus = document.getElementById('sync-status');
            syncStatus.textContent = '저장 대기 중...';
            syncStatus.className = 'text-[10px] sm:text-xs text-yellow-400 font-medium';

            if (saveTimeout) clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(async () => {
                syncStatus.textContent = '클라우드 저장 중...';
                
                const compressedData = {};
                for (const [key, zoneId] of Object.entries(gridData)) {
                    if (!compressedData[zoneId]) compressedData[zoneId] = [];
                    compressedData[zoneId].push(key);
                }

                // ZONES 객체에서 파이어베이스에 저장할 수 없는 HTML 요소(element) 제거
                const cleanZonesDef = {};
                for (const [zoneId, zoneData] of Object.entries(ZONES)) {
                    const { element, ...pureData } = zoneData;
                    cleanZonesDef[zoneId] = pureData;
                }

                try {
                    const docRef = doc(db, 'users', currentUser.uid, 'bgm_zones', 'data');
                    await setDoc(docRef, { 
                        zonesDef: cleanZonesDef,
                        zones: compressedData,
                        updatedAt: new Date().toISOString()
                    });
                    syncStatus.textContent = '클라우드 동기화 완료';
                    syncStatus.className = 'text-[10px] sm:text-xs text-green-400 font-medium';
                    setTimeout(() => { syncStatus.textContent = ''; }, 3000);
                } catch (e) {
                    console.error("실시간 저장 실패:", e);
                    syncStatus.textContent = '동기화 실패';
                    syncStatus.className = 'text-[10px] sm:text-xs text-red-400 font-medium';
                }
            }, 1500);
        }

        async function loadFromFirebase() {
            if (!db || !currentUser) return;
            
            const syncStatus = document.getElementById('sync-status');
            syncStatus.textContent = '클라우드 데이터 불러오는 중...';
            syncStatus.className = 'text-[10px] sm:text-xs text-blue-400 font-medium';

            try {
                const docRef = doc(db, 'users', currentUser.uid, 'bgm_zones', 'data');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    gridLayer.clearLayers();
                    for (const key in gridData) delete gridData[key];
                    for (const key in gridRectangles) delete gridRectangles[key];

                    const data = docSnap.data();
                    
                    if (data.zonesDef) {
                        ZONES = data.zonesDef;
                        initPalette();
                    }

                    if (data.zones) {
                        for (const [zoneId, keys] of Object.entries(data.zones)) {
                            keys.forEach(key => {
                                gridData[key] = zoneId;
                                const [latStr, lngStr] = key.split('_');
                                drawRect(key, parseInt(latStr), parseInt(lngStr), zoneId);
                            });
                        }
                    }
                    syncStatus.textContent = '동기화 완료';
                    syncStatus.className = 'text-[10px] sm:text-xs text-green-400 font-medium';
                    setTimeout(() => { syncStatus.textContent = ''; }, 3000);
                } else {
                    syncStatus.textContent = '저장된 클라우드 데이터 없음';
                    setTimeout(() => { syncStatus.textContent = ''; }, 3000);
                }
            } catch (e) {
                console.error("불러오기 에러:", e);
                syncStatus.textContent = '불러오기 실패';
                syncStatus.className = 'text-[10px] sm:text-xs text-red-400 font-medium';
            }
        }

        // ==========================================
        // 4. 지도 및 팔레트 초기화
        // ==========================================
        const map = L.map('map', {
            zoomControl: false,
            doubleClickZoom: false
        }).setView([35.8242, 127.1480], 18); 

        // Google Maps Standard Roadmap 타일 적용
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 21,
            attribution: '© Google Maps'
        }).addTo(map);

        const gridLayer = L.featureGroup().addTo(map);
        const brushPreviewLayer = L.featureGroup().addTo(map); 

        const paletteContainer = document.getElementById('palette-container');
        
        function initPalette() {
            paletteContainer.innerHTML = ''; 
            for (const [zoneId, zone] of Object.entries(ZONES)) {
                addZoneToPalette(zoneId, zone);
            }
            renderPalette();
        }

        function addZoneToPalette(zoneId, zone) {
            const el = document.createElement('div');
            el.className = `p-1.5 sm:p-2 rounded border-2 transition ${selectedZone === zoneId ? 'border-gray-800 shadow-md bg-gray-50' : 'border-transparent hover:bg-gray-100'}`;
            
            let bgStyle = `background-color: ${zone.color};`;
            let patternOverlay = '';
            if (zone.pattern === 'url(#pattern-stripes)') patternOverlay = 'repeating-linear-gradient(45deg, transparent, transparent 2px, white 2px, white 4px)';
            else if (zone.pattern === 'url(#pattern-dots)') patternOverlay = 'radial-gradient(white 20%, transparent 20%) 0 0 / 6px 6px';
            else if (zone.pattern === 'url(#pattern-cross)') patternOverlay = 'repeating-linear-gradient(0deg, transparent, transparent 3px, white 3px, white 4px), repeating-linear-gradient(90deg, transparent, transparent 3px, white 3px, white 4px)';

            el.innerHTML = `
                <div class="flex items-center justify-between w-full">
                    <div class="flex items-center space-x-2 sm:space-x-3 w-[120px] sm:w-[160px] cursor-pointer zone-select-area overflow-hidden">
                        <div class="w-5 h-5 sm:w-6 sm:h-6 rounded border border-gray-300 relative overflow-hidden shrink-0" style="${bgStyle}">
                            <div class="absolute inset-0 opacity-50" style="background: ${patternOverlay};"></div>
                        </div>
                        <div class="truncate">
                            <div class="text-[11px] sm:text-sm font-bold text-gray-800 truncate">${zone.name}</div>
                            <div class="text-[9px] sm:text-xs text-gray-500 truncate">${zone.title}</div>
                        </div>
                    </div>
                    <div class="flex space-x-0.5 sm:space-x-1 text-gray-400 shrink-0">
                        <button class="hover:text-blue-500 p-1 sm:p-1.5 btn-edit-zone text-[10px] sm:text-xs" title="수정"><i class="fa-solid fa-pen"></i></button>
                        <button class="hover:text-red-500 p-1 sm:p-1.5 btn-del-zone text-[10px] sm:text-xs" title="삭제"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `;
            
            el.querySelector('.zone-select-area').onclick = () => {
                selectedZone = zoneId;
                if (currentMode !== 'paint') setMode('paint');
                renderPalette();
            };

            el.querySelector('.btn-edit-zone').onclick = (e) => {
                e.stopPropagation();
                openEditModal(zoneId);
            };

            el.querySelector('.btn-del-zone').onclick = (e) => {
                e.stopPropagation();
                deleteZoneLocally(zoneId);
            };

            paletteContainer.appendChild(el);
            zone.element = el;
        }

        function renderPalette() {
            for (const [zoneId, zone] of Object.entries(ZONES)) {
                if (!zone.element) continue;
                if (selectedZone === zoneId && currentMode === 'paint') {
                    zone.element.classList.add('border-gray-800', 'shadow-md', 'bg-gray-50');
                    zone.element.classList.remove('border-transparent');
                } else {
                    zone.element.classList.remove('border-gray-800', 'shadow-md', 'bg-gray-50');
                    zone.element.classList.add('border-transparent');
                }
            }
        }

        initPalette();

        // ==========================================
        // 4-1. 새 구역 추가 모달 제어 로직
        // ==========================================
        const modal = document.getElementById('add-zone-modal');
        document.getElementById('btn-add-zone').onclick = () => {
            editingZoneId = null;
            document.getElementById('modal-title').innerText = "새 음악 구역 만들기";
            document.getElementById('btn-submit-zone').innerText = "추가";
            
            document.getElementById('new-zone-name').value = '';
            document.getElementById('new-zone-color').value = '#10b981';
            document.getElementById('new-zone-pattern').value = 'url(#pattern-stripes)';
            document.getElementById('new-zone-vid').value = '';
            document.getElementById('new-zone-title').value = '';
            document.getElementById('yt-fetch-msg').textContent = '';

            modal.classList.remove('hidden');
        };

        function openEditModal(zoneId) {
            editingZoneId = zoneId;
            const zone = ZONES[zoneId];
            
            document.getElementById('modal-title').innerText = "음악 구역 수정하기";
            document.getElementById('btn-submit-zone').innerText = "수정";
            
            document.getElementById('new-zone-name').value = zone.name;
            document.getElementById('new-zone-color').value = zone.color;
            document.getElementById('new-zone-pattern').value = zone.pattern;
            document.getElementById('new-zone-vid').value = zone.videoId;
            document.getElementById('new-zone-title').value = zone.title;
            document.getElementById('yt-fetch-msg').textContent = '';

            modal.classList.remove('hidden');
        }

        function deleteZoneLocally(zoneId) {
            if (!confirm(`'${ZONES[zoneId].name}' 구역을 삭제하시겠습니까?\n(지도에 칠해진 해당 구역 데이터도 함께 지워집니다)`)) return;
            
            delete ZONES[zoneId];
            
            for (const key in gridData) {
                if (gridData[key] === zoneId) {
                    delete gridData[key];
                    if (gridRectangles[key]) {
                        gridLayer.removeLayer(gridRectangles[key]);
                        delete gridRectangles[key];
                    }
                }
            }
            
            if (selectedZone === zoneId) {
                const keys = Object.keys(ZONES);
                selectedZone = keys.length > 0 ? keys[0] : null;
            }
            
            initPalette();
            scheduleFirebaseSave(); 
        }

        document.getElementById('btn-cancel-zone').onclick = () => {
            modal.classList.add('hidden');
        };

        // YouTube 링크에서 ID 추출하는 함수
        function extractYouTubeID(url) {
            if (url.length === 11 && !url.includes('/')) return url; // 이미 11자리 ID인 경우
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // YouTube 제목 자동 가져오기 버튼 로직
        document.getElementById('btn-fetch-yt').onclick = async () => {
            const inputVal = document.getElementById('new-zone-vid').value.trim();
            const msgEl = document.getElementById('yt-fetch-msg');
            
            if (!inputVal) {
                msgEl.textContent = "링크를 먼저 입력해주세요.";
                msgEl.className = "text-[10px] text-red-500 mt-1";
                return;
            }

            const videoId = extractYouTubeID(inputVal);
            
            if (videoId) {
                document.getElementById('new-zone-vid').value = videoId; // 깔끔한 ID로 변환
                msgEl.textContent = "정보를 불러오는 중...";
                msgEl.className = "text-[10px] text-blue-500 mt-1";

                try {
                    // YouTube OEmbed API를 이용해 우회 없이 영상 정보 가져오기
                    const response = await fetch(`https://noembed.com/embed?dataType=json&url=https://www.youtube.com/watch?v=${videoId}`);
                    const data = await response.json();
                    
                    if (data.title) {
                        document.getElementById('new-zone-title').value = data.title;
                        msgEl.textContent = "제목을 성공적으로 가져왔습니다!";
                        msgEl.className = "text-[10px] text-green-500 mt-1";
                    } else {
                        msgEl.textContent = "제목을 찾을 수 없습니다. 직접 입력해주세요.";
                        msgEl.className = "text-[10px] text-red-500 mt-1";
                    }
                } catch (error) {
                    msgEl.textContent = "정보를 불러오는데 실패했습니다.";
                    msgEl.className = "text-[10px] text-red-500 mt-1";
                }
            } else {
                msgEl.textContent = "유효한 YouTube 링크가 아닙니다.";
                msgEl.className = "text-[10px] text-red-500 mt-1";
            }
        };

        document.getElementById('btn-submit-zone').onclick = () => {
            const name = document.getElementById('new-zone-name').value.trim();
            const color = document.getElementById('new-zone-color').value;
            const pattern = document.getElementById('new-zone-pattern').value;
            let videoId = document.getElementById('new-zone-vid').value.trim();
            const title = document.getElementById('new-zone-title').value.trim();

            if (!name || !videoId) {
                alert("구역 이름과 YouTube Video ID는 필수입니다.");
                return;
            }

            // 추가 버튼을 바로 눌렀을 때를 대비한 자동 ID 치환
            const extractedId = extractYouTubeID(videoId);
            if (extractedId) videoId = extractedId;

            if (editingZoneId) {
                ZONES[editingZoneId] = { name, color, pattern, videoId, title: title || '알 수 없는 음악' };
                for (const key in gridData) {
                    if (gridData[key] === editingZoneId) {
                        const [latStr, lngStr] = key.split('_');
                        if (gridRectangles[key]) gridLayer.removeLayer(gridRectangles[key]);
                        delete gridRectangles[key];
                        drawRect(key, parseInt(latStr), parseInt(lngStr), editingZoneId);
                    }
                }
                selectedZone = editingZoneId;
            } else {
                const newZoneId = 'zone_' + Date.now();
                ZONES[newZoneId] = {
                    name: name,
                    color: color,
                    pattern: pattern,
                    videoId: videoId,
                    title: title || '알 수 없는 음악'
                };
                selectedZone = newZoneId;
            }

            initPalette();
            setMode('paint');
            modal.classList.add('hidden');
            scheduleFirebaseSave(); 
        };

        // ==========================================
        // 5. 그리드 페인팅 핵심 로직
        // ==========================================
        function getGridCoords(lat, lng) {
            return {
                latIdx: Math.floor(lat / GRID_SIZE),
                lngIdx: Math.floor(lng / GRID_SIZE)
            };
        }

        function getBounds(latIdx, lngIdx) {
            return [
                [latIdx * GRID_SIZE, lngIdx * GRID_SIZE],
                [(latIdx + 1) * GRID_SIZE, (lngIdx + 1) * GRID_SIZE]
            ];
        }

        function handleDraw(latlng) {
            const { latIdx, lngIdx } = getGridCoords(latlng.lat, latlng.lng);
            const brushSize = parseInt(document.getElementById('brush-size').value, 10);
            const offset = brushSize - 1; 

            if (currentMode === 'paint' && (!selectedZone || !ZONES[selectedZone])) return; 

            for (let i = -offset; i <= offset; i++) {
                for (let j = -offset; j <= offset; j++) {
                    const currentLatIdx = latIdx + i;
                    const currentLngIdx = lngIdx + j;
                    const key = `${currentLatIdx}_${currentLngIdx}`;

                    if (currentMode === 'paint') {
                        if (gridData[key]) continue; 
                        gridData[key] = selectedZone;
                        drawRect(key, currentLatIdx, currentLngIdx, selectedZone);
                        scheduleFirebaseSave(); 
                    } 
                    else if (currentMode === 'erase') {
                        if (gridData[key]) {
                            delete gridData[key];
                            if (gridRectangles[key]) {
                                gridLayer.removeLayer(gridRectangles[key]);
                                delete gridRectangles[key];
                            }
                            scheduleFirebaseSave(); 
                        }
                    }
                }
            }
        }

        function drawRect(key, latIdx, lngIdx, zoneId) {
            if (gridRectangles[key]) return; 
            
            const bounds = getBounds(latIdx, lngIdx);
            const zone = ZONES[zoneId];
            
            const group = L.layerGroup();
            L.rectangle(bounds, { fillColor: zone.color, fillOpacity: 0.7, color: 'transparent', weight: 0, interactive: false }).addTo(group);

            // 타일 사이의 하얀 격자선을 없애 줌 아웃 시 하나의 덩어리로 보이도록 수정 (color: 'transparent', weight: 0)
            const patternRect = L.rectangle(bounds, { fillColor: 'transparent', fillOpacity: 1, color: 'transparent', weight: 0, interactive: false });
            if (zone.pattern && zone.pattern !== 'none') {
                patternRect.on('add', function() { if (this._path) this._path.setAttribute('fill', zone.pattern); });
            }
            patternRect.addTo(group);
            
            group.addTo(gridLayer);
            gridRectangles[key] = group;
        }

        function updateBrushPreview(latlng) {
            brushPreviewLayer.clearLayers();
            if (currentMode === 'pan' || !latlng) return;

            const { latIdx, lngIdx } = getGridCoords(latlng.lat, latlng.lng);
            const brushSize = parseInt(document.getElementById('brush-size').value, 10);
            const offset = brushSize - 1;

            const minLat = (latIdx - offset) * GRID_SIZE;
            const minLng = (lngIdx - offset) * GRID_SIZE;
            const maxLat = (latIdx + offset + 1) * GRID_SIZE;
            const maxLng = (lngIdx + offset + 1) * GRID_SIZE;

            L.rectangle([[minLat, minLng], [maxLat, maxLng]], {
                color: currentMode === 'erase' ? '#ef4444' : '#3b82f6',
                weight: 2, dashArray: '4, 4',
                fillColor: currentMode === 'erase' ? '#ef4444' : '#3b82f6',
                fillOpacity: 0.1, interactive: false
            }).addTo(brushPreviewLayer);
        }

        map.on('mousedown', (e) => {
            if (e.originalEvent.button === 1) return; 
            if (currentMode === 'pan') return;
            isPainting = true;
            handleDraw(e.latlng);
        });
        
        map.on('mousemove', (e) => {
            updateBrushPreview(e.latlng); 
            if (!isPainting || currentMode === 'pan' || e.originalEvent.button === 1) return;
            handleDraw(e.latlng);
        });
        
        map.on('mouseup', () => { isPainting = false; });
        map.on('mouseout', () => { 
            isPainting = false; 
            brushPreviewLayer.clearLayers(); 
        });

        // Wheel Click Pan logic
        let isMiddleClickPanning = false;
        let lastMousePos = null;
        const mapContainer = document.getElementById('map');

        mapContainer.addEventListener('mousedown', (e) => {
            if (e.button === 1) { 
                e.preventDefault();
                isMiddleClickPanning = true;
                lastMousePos = { x: e.clientX, y: e.clientY };
                mapContainer.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isMiddleClickPanning) {
                const dx = e.clientX - lastMousePos.x;
                const dy = e.clientY - lastMousePos.y;
                map.panBy([-dx, -dy], { animate: false });
                lastMousePos = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 1 && isMiddleClickPanning) {
                isMiddleClickPanning = false;
                mapContainer.style.cursor = currentMode === 'pan' ? 'grab' : (currentMode === 'erase' ? 'cell' : 'crosshair');
            }
        });

        // ==========================================
        // 6. 도구 모드 설정 및 UI 제어
        // ==========================================
        function setMode(mode) {
            currentMode = mode;
            
            document.getElementById('btn-pan').classList.toggle('active', mode === 'pan');
            document.getElementById('btn-paint').classList.toggle('active', mode === 'paint');
            document.getElementById('btn-erase').classList.toggle('active', mode === 'erase');

            const brushContainer = document.getElementById('brush-size-container');
            const brushDivider = document.getElementById('brush-size-divider');
            if (mode === 'pan') {
                brushContainer.classList.add('hidden');
                brushContainer.classList.remove('flex');
            } else {
                brushContainer.classList.remove('hidden');
                brushContainer.classList.add('flex');
            }

            if (mode === 'pan') {
                map.dragging.enable();
                map.getContainer().style.cursor = 'grab';
            } else {
                map.dragging.disable(); 
                map.getContainer().style.cursor = mode === 'erase' ? 'cell' : 'crosshair';
            }
            renderPalette();
        }

        document.getElementById('btn-pan').onclick = () => setMode('pan');
        document.getElementById('btn-paint').onclick = () => setMode('paint');
        document.getElementById('btn-erase').onclick = () => setMode('erase');

        // ==========================================
        // 7. YouTube 심리스 재생
        // ==========================================
        let ytPlayer1, ytPlayer2;
        let activePlayer = 1;
        let isYtReady = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            const pConfig = { height: '1', width: '1', playerVars: { 'playsinline': 1, 'controls': 0, 'loop': 1 } };
            ytPlayer1 = new YT.Player('yt-player-1', { ...pConfig, events: { 'onReady': onPlayerReady }});
            ytPlayer2 = new YT.Player('yt-player-2', { ...pConfig, events: { 'onReady': onPlayerReady }});
        };

        let playersReadyCount = 0;
        function onPlayerReady() {
            playersReadyCount++;
            if (playersReadyCount === 2) isYtReady = true;
        }

        function playZoneAudio(zoneId) {
            if (!isYtReady || !isAudioAllowed) return;

            const nextVideoId = zoneId ? ZONES[zoneId].videoId : null;
            const pOut = activePlayer === 1 ? ytPlayer1 : ytPlayer2;
            const pIn = activePlayer === 1 ? ytPlayer2 : ytPlayer1;

            if (!nextVideoId) {
                fadeAudio(pOut, pOut.getVolume(), 0, () => pOut.pauseVideo());
                updateStatusUI(null);
                return;
            }

            pIn.loadVideoById({ videoId: nextVideoId });
            pIn.setVolume(0);
            pIn.playVideo();

            fadeAudio(pOut, pOut.getVolume() || 100, 0, () => pOut.pauseVideo());
            fadeAudio(pIn, 0, 100);
            
            activePlayer = activePlayer === 1 ? 2 : 1;
            updateStatusUI(zoneId);
        }

        function fadeAudio(player, startVol, endVol, onComplete) {
            if (!player || typeof player.setVolume !== 'function') return;
            
            const duration = 3000; 
            const steps = 30;
            const stepTime = duration / steps;
            const volStep = (endVol - startVol) / steps;
            let currentVol = startVol;
            let currentStep = 0;

            const interval = setInterval(() => {
                currentStep++;
                currentVol += volStep;
                if (currentVol < 0) currentVol = 0;
                if (currentVol > 100) currentVol = 100;
                player.setVolume(currentVol);

                if (currentStep >= steps) {
                    clearInterval(interval);
                    player.setVolume(endVol);
                    if (onComplete) onComplete();
                }
            }, stepTime);
        }

        function updateStatusUI(zoneId) {
            const statusZone = document.getElementById('status-zone');
            const statusSong = document.getElementById('status-song');

            if (zoneId && ZONES[zoneId]) {
                statusZone.textContent = `현재 구역: ${ZONES[zoneId].name}`;
                statusZone.style.color = ZONES[zoneId].color;
                statusSong.textContent = ZONES[zoneId].title;
            } else {
                statusZone.textContent = `구역 이탈 (빈 공간)`;
                statusZone.style.color = '#d1d5db';
                statusSong.textContent = '재생 중인 음악 없음';
            }
        }

        // ==========================================
        // 8. 위치 추적 (GPS) 자동 시작 로직
        // ==========================================
        function startGPSAuto() {
            if (navigator.geolocation) {
                document.getElementById('btn-gps').classList.add('text-blue-500');
                
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;

                    if (!userLocationMarker) {
                        userLocationMarker = L.circleMarker([lat, lng], {
                            color: 'white', fillColor: '#3b82f6', fillOpacity: 1, radius: 8, weight: 2
                        }).addTo(map);
                        map.panTo([lat, lng]);
                    } else {
                        userLocationMarker.setLatLng([lat, lng]);
                    }

                    checkLocationZone(lat, lng);

                }, (err) => console.error("GPS 에러:", err), { enableHighAccuracy: true });
            }
        }

        // 브라우저 정책 우회를 위한 1회성 글로벌 클릭 이벤트 (오디오 활성화용)
        document.body.addEventListener('click', () => {
            if (!isAudioAllowed) {
                isAudioAllowed = true;
                if(ytPlayer1 && ytPlayer1.playVideo) {
                    ytPlayer1.setVolume(0); 
                    ytPlayer1.playVideo(); 
                    ytPlayer1.pauseVideo();
                }
                // 위치가 이미 잡혀있다면 해당 구역 음악 바로 시작
                if (currentPlayingZone) {
                    playZoneAudio(currentPlayingZone);
                }
            }
        }, { once: true });

        // 내 위치로 이동 버튼 로직 (끄기 기능 삭제됨)
        document.getElementById('btn-gps').onclick = (e) => {
            e.stopPropagation(); // 오디오 활성화 글로벌 클릭과 중복 방지
            if (userLocationMarker) {
                map.panTo(userLocationMarker.getLatLng());
            } else {
                alert("아직 위치를 찾는 중입니다...");
            }
        };

        function checkLocationZone(lat, lng) {
            const { latIdx, lngIdx } = getGridCoords(lat, lng);
            const key = `${latIdx}_${lngIdx}`;
            const targetZone = gridData[key] || null;

            if (currentPlayingZone !== targetZone) {
                currentPlayingZone = targetZone;
                playZoneAudio(targetZone);
            }
        }

        // 앱 시작 시 GPS 자동 실행
        startGPSAuto();

        // ==========================================
        // 9. Firebase 로그인 및 에러 핸들링
        // ==========================================
        document.getElementById('btn-login').onclick = async () => {
            if (!auth) return alert("Firebase Config가 설정되지 않았습니다.");
            if (currentUser) {
                auth.signOut();
                return;
            }
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("로그인 실패 원인:", error);
                
                if (error.code === 'auth/unauthorized-domain') {
                    alert(`로그인 실패: 승인되지 않은 도메인입니다.\nFirebase 콘솔의 [Authentication] -> [설정] -> [승인된 도메인]에 현재 사이트 주소를 추가해주세요.`);
                } else if (error.code === 'auth/popup-closed-by-user') {
                    alert("로그인 창이 닫혔습니다. 팝업 차단이 되어있을 수 있습니다.\n* 현재 미리보기 화면에서는 보안상 로그인이 안 될 수 있습니다. 새 탭이나 Github 배포 링크에서 테스트해주세요.");
                } else {
                    alert(`로그인 실패: ${error.message}\n(현재 미리보기 화면에서 팝업이 차단되었을 수 있습니다)`);
                }
            }
        };

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const loginBtn = document.getElementById('btn-login');
                const authStatus = document.getElementById('auth-status');
                
                if (user) {
                    loginBtn.innerHTML = `<i class="fa-solid fa-sign-out-alt text-gray-600 sm:mr-1"></i> <span class="hidden sm:inline">로그아웃</span>`;
                    authStatus.textContent = `${user.displayName}님`;
                    authStatus.classList.replace('text-gray-400', 'text-green-400');
                    loadFromFirebase();
                } else {
                    loginBtn.innerHTML = `<i class="fa-brands fa-google text-red-500 sm:mr-1"></i> <span class="hidden sm:inline">로그인</span>`;
                    authStatus.textContent = '비로그인 상태';
                    authStatus.classList.replace('text-green-400', 'text-gray-400');
                    document.getElementById('sync-status').textContent = '';
                }
            });
        }

        // ------------------------------------------
        // JSON 로컬 저장/불러오기
        // ------------------------------------------
        document.getElementById('btn-save').onclick = () => {
            const compressedData = {};
            for (const [key, zoneId] of Object.entries(gridData)) {
                if (!compressedData[zoneId]) compressedData[zoneId] = [];
                compressedData[zoneId].push(key);
            }

            const cleanZonesDef = {};
            for (const [zoneId, zoneData] of Object.entries(ZONES)) {
                const { element, ...pureData } = zoneData;
                cleanZonesDef[zoneId] = pureData;
            }

            const exportData = { zonesDef: cleanZonesDef, zones: compressedData, exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bgm_zones_export_${new Date().getTime()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.json';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    gridLayer.clearLayers();
                    for (const key in gridData) delete gridData[key];
                    for (const key in gridRectangles) delete gridRectangles[key];
                    
                    if (data.zonesDef) { ZONES = data.zonesDef; initPalette(); }
                    if (data.zones) {
                        for (const [zoneId, keys] of Object.entries(data.zones)) {
                            keys.forEach(key => {
                                gridData[key] = zoneId;
                                const [latStr, lngStr] = key.split('_');
                                drawRect(key, parseInt(latStr), parseInt(lngStr), zoneId);
                            });
                        }
                    }
                    alert("JSON 파일을 성공적으로 불러왔습니다.");
                    scheduleFirebaseSave(); 
                } catch (err) { alert("잘못된 형식의 JSON 파일입니다."); }
                fileInput.value = ''; 
            };
            reader.readAsText(file);
        };
        document.getElementById('btn-load').onclick = () => fileInput.click();

        setMode('pan');

    </script>
</body>
</html>
